# #######################################################################################
# CONFIGURATION HYPRLAND DE MAX
# #######################################################################################

env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = cursor:no_hardware_cursors,1

# --- MONITEUR ---
# Syntaxe : monitor=NOM, RÉSOLUTION@FRÉQUENCE, POSITION, ÉCHELLE
# eDP-1 est ton écran PC. 1920x1200@165 exploite tes 165Hz. 0x0 est le point de départ.
monitor=eDP-1, 1920x1200@165, 0x0, 1
monitor=eDP-2, 1920x1200@165, 0x0, 1

# --- AUTOSTART ---
# exec-once lance le programme UNE SEULE FOIS au démarrage de la session.
exec-once = quickshell                                  # Lance ton interface (barre, etc.)
exec-once = /usr/lib/polkit-kde-authentication-agent-1  # Permet aux fenêtres de demander le mdp root

# --- VARIABLES ---
$mainMod = SUPER     # Touche Windows (souvent appelée Mod4)
$terminal = kitty    # Ton terminal de prédilection
$menu = wofi --show drun # Ton lanceur d'applications

# --- CLAVIER & SOURIS ---
input {
    kb_layout = fr        # Définit le clavier en AZERTY
    numlock_by_default = true
    follow_mouse = 1      # La fenêtre active change quand la souris passe dessus
    
    touchpad {
        natural_scroll = no # 'no' = défilement classique, 'yes' = défilement tablette/mac
    }
}

# --- ESTHÉTIQUE (LOOK) ---
general {
    gaps_in = 5           # Espace entre deux fenêtres (en pixels)
    gaps_out = 10         # Espace entre les fenêtres et le bord de l'écran
    border_size = 2       # Épaisseur de la bordure des fenêtres
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg # Dégradé de bleu/vert pour la fenêtre active
    col.inactive_border = rgba(595959aa) # Gris transparent pour les fenêtres inactives
    layout = dwindle      # Mode de rangement (dwindle = spirale automatique)
}

decoration {
    screen_shader = ~/.config/hypr/shaders/vibrance.frag
    rounding = 10         # Arrondi des angles (en pixels)
    blur {
        enabled = true    # Active l'effet de flou derrière les fenêtres transparentes
        size = 3
        passes = 1
    }
}

# --- RACCOURCIS CLAVIER (BINDS) ---
# Format : bind = MODIFICATEUR, TOUCHE, ACTION, ARGUMENT

# Applications
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, Q, killactive,             # Fermer la fenêtre
bind = $mainMod, M, exit,                   # Quitter Hyprland (déconnexion)
bind = $mainMod, D, exec, $menu             # Ouvrir le menu d'applis
bind = $mainMod, V, togglefloating,         # Passer une fenêtre en mode "flottant"

# Déplacement du focus (Navigation entre fenêtres avec les flèches)
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Navigation Workspaces (AZERTY specifique)
# On utilise les noms des touches car le chiffre direct ne marche pas en AZERTY
bind = $mainMod, ampersand, workspace, 1
bind = $mainMod, eacute, workspace, 2
bind = $mainMod, quotedbl, workspace, 3
bind = $mainMod, apostrophe, workspace, 4
bind = $mainMod, parenleft, workspace, 5
# --- SCREENSHOTS ---

# Capture d'écran de toute la zone (Full Screen)
bind = , Print, exec, grim ~/Pictures/Screenshots/$(date +'%Y-%m-%d_%Hh%Mm%Ss').png && notify-send "Capture d'écran sauvegardée"

# Capture d'écran d'une zone sélectionnée (Region)
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | swappy -f -

# Capture d'écran d'une zone et copie directe dans le presse-papier (sans swappy)
bind = $mainMod CTRL, S, exec, grim -g "$(slurp)" - | wl-copy && notify-send "Capture copiée dans le presse-papier"
